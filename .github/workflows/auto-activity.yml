name: Auto Activity

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate activity
        run: |
          python3 << 'PY'
          import random
          from datetime import datetime
          if random.random() < 0.70:
              raise SystemExit(0)
          msgs=[
            "docs: update notes","fix: minor issue","refactor: cleanup",
            "chore: maintenance","style: formatting","feat: improve project",
            "test: update","build: refresh"
          ]
          with open("activity.log","a") as f:
              f.write(datetime.utcnow().isoformat()+"Z\n")
          with open(".commitmsg","w") as f:
              f.write(random.choice(msgs))
          PY

      - name: Commit
        run: |
          test -f .commitmsg || exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add activity.log
          git commit -m "$(cat .commitmsg)" || exit 0
          git push
